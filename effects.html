<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Pastoral FX Overlay</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: transparent !important;
    overflow: hidden;
    pointer-events: none;
    user-select: none;
  }

  #stage {
    position: absolute;
    inset: 0;
    background: transparent;
  }

  .fx-text {
    position: absolute;
    z-index: 5;
    isolation: isolate;
    transform: translate(-50%, -50%);
    pointer-events: none;
    will-change: transform, opacity, filter;
    font-family: "Songti SC", "STSong", "Kaiti SC", "PingFang SC", "Hiragino Sans GB", serif;
    font-weight: 600;
    letter-spacing: 0;
    line-height: 1.08;
    white-space: nowrap;
    color: #fff7df;
    -webkit-text-stroke: 0.28px rgba(80, 58, 31, 0.34);
    text-shadow:
      0 1px 1px rgba(88, 61, 35, 0.42),
      0 7px 20px rgba(88, 61, 35, 0.28),
      0 0 18px rgba(255, 235, 163, 0.58);
    filter: drop-shadow(0 8px 14px rgba(51, 70, 36, 0.18));
  }

  .fx-text::before {
    content: "";
    position: absolute;
    z-index: -1;
    inset: -9px -20px -8px;
    border-radius: 999px;
    background:
      radial-gradient(ellipse at 50% 45%, rgba(255, 250, 221, 0.66), rgba(255, 250, 221, 0.16) 58%, rgba(255, 250, 221, 0) 74%),
      linear-gradient(90deg, rgba(156, 185, 108, 0.18), rgba(255, 220, 128, 0.17));
    border: 1px solid rgba(255, 238, 174, 0.22);
    box-shadow:
      0 8px 24px rgba(72, 89, 48, 0.14),
      inset 0 0 18px rgba(255, 248, 211, 0.2);
  }

  .fx-text.spring {
    color: #f5ffe8;
    background: linear-gradient(180deg, #fffff3 0%, #d6f6b6 48%, #9fcd78 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
      0 1px 1px rgba(42, 78, 36, 0.38),
      0 7px 18px rgba(69, 96, 47, 0.28),
      0 0 16px rgba(195, 238, 149, 0.55);
  }

  .fx-text.harvest {
    color: #fff2bc;
    background: linear-gradient(180deg, #fffbe0 0%, #ffe18b 48%, #c99c45 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
      0 1px 1px rgba(91, 61, 22, 0.42),
      0 8px 22px rgba(124, 78, 24, 0.28),
      0 0 20px rgba(255, 215, 118, 0.62);
  }

  .fx-text.levelup::before {
    inset: -13px -30px -11px;
    background:
      radial-gradient(ellipse at 50% 42%, rgba(255, 246, 198, 0.78), rgba(255, 226, 132, 0.18) 60%, rgba(255, 226, 132, 0) 78%),
      linear-gradient(90deg, rgba(123, 166, 94, 0.22), rgba(232, 185, 75, 0.22), rgba(123, 166, 94, 0.18));
    border-color: rgba(255, 228, 143, 0.34);
  }

  @keyframes meadowFloat {
    0%   { transform: translate(-50%, -34%) scale(0.78) rotate(-0.6deg); opacity: 0; filter: blur(2px); }
    20%  { transform: translate(-50%, -52%) scale(1.04) rotate(0.5deg); opacity: 1; filter: blur(0); }
    58%  { transform: translate(-50%, -82%) scale(1.0) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -138%) scale(0.92) rotate(-0.4deg); opacity: 0; filter: blur(1px); }
  }
  .fx-text.float { animation: meadowFloat 1.72s cubic-bezier(.2,.74,.2,1) forwards; }

  @keyframes petalAccent {
    0%   { transform: translate(-50%, -30%) scale(0.55) rotate(-2deg); opacity: 0; filter: blur(1.5px); }
    16%  { transform: translate(-50%, -54%) scale(1.12) rotate(1deg); opacity: 1; filter: blur(0); }
    32%  { transform: translate(-50%, -61%) scale(0.96) rotate(-0.4deg); opacity: 1; }
    68%  { transform: translate(-50%, -90%) scale(1.0) rotate(0.3deg); opacity: 1; }
    100% { transform: translate(-50%, -150%) scale(0.86) rotate(-0.6deg); opacity: 0; filter: blur(1px); }
  }
  .fx-text.critical { animation: petalAccent 1.82s cubic-bezier(.17,.84,.23,1) forwards; }

  @keyframes harvestCrown {
    0%   { transform: translate(-50%, -42%) scale(0.48) rotate(-2.5deg); opacity: 0; filter: blur(2px); }
    15%  { transform: translate(-50%, -60%) scale(1.13) rotate(1.6deg); opacity: 1; filter: blur(0); }
    28%  { transform: translate(-50%, -56%) scale(0.96) rotate(-0.8deg); opacity: 1; }
    44%  { transform: translate(-50%, -63%) scale(1.02) rotate(0.3deg); opacity: 1; }
    78%  { transform: translate(-50%, -78%) scale(1.0) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -118%) scale(0.9) rotate(0deg); opacity: 0; filter: blur(1px); }
  }
  .fx-text.levelup { animation: harvestCrown 2.08s cubic-bezier(.18,.9,.22,1) forwards; }

  @keyframes meadowRing {
    0%   { transform: translate(-50%, -50%) scale(0.18); opacity: 0.72; filter: blur(0); }
    72%  { opacity: 0.32; }
    100% { transform: translate(-50%, -50%) scale(2.35); opacity: 0; filter: blur(1px); }
  }
  .fx-ring {
    position: absolute;
    z-index: 2;
    width: 156px;
    height: 66px;
    border: 1.4px solid rgba(188, 222, 128, 0.72);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    box-shadow:
      0 0 20px rgba(172, 220, 113, 0.34),
      inset 0 0 18px rgba(255, 235, 154, 0.24);
    animation: meadowRing 1.18s ease-out forwards;
  }
  .fx-ring.harvest {
    width: 184px;
    height: 76px;
    border-color: rgba(255, 218, 120, 0.78);
    box-shadow:
      0 0 28px rgba(255, 196, 92, 0.38),
      inset 0 0 18px rgba(255, 248, 198, 0.32);
  }

  @keyframes meadowDrift {
    0%   { transform: translate(-50%, -50%) scale(0.38) rotate(0deg); opacity: 0; filter: blur(0.5px); }
    15%  { opacity: 0.92; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(var(--scale, 0.92)) rotate(var(--rot)); opacity: 0; filter: blur(1.1px); }
  }
  .fx-particle {
    position: absolute;
    z-index: 3;
    pointer-events: none;
    animation: meadowDrift var(--dur, 1.25s) cubic-bezier(.18,.72,.24,1) forwards;
    transform-origin: center;
  }
  .fx-particle.leaf {
    width: 9px;
    height: 15px;
    border-radius: 78% 18% 74% 22%;
    box-shadow: 0 0 9px rgba(239, 229, 146, 0.42);
  }
  .fx-particle.petal {
    width: 8px;
    height: 12px;
    border-radius: 80% 30% 72% 28%;
    box-shadow: 0 0 9px rgba(255, 239, 175, 0.5);
  }
  .fx-particle.mote {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(255, 239, 169, 0.76);
  }
</style>
</head>
<body>
<div id="stage"></div>
<script>
  const stage = document.getElementById('stage');

  function variantFor(color, kind) {
    if (kind === 'levelup') return 'harvest';
    if (color && /(FFD700|E8C84A|ffd|ffe|e8c|star)/i.test(color)) return 'harvest';
    return 'spring';
  }

  function fontSizeFor(kind) {
    if (kind === 'levelup') return '52px';
    if (kind === 'critical') return '42px';
    return '30px';
  }

  function spawnFloat(text, x, y, color, kind) {
    const el = document.createElement('div');
    const variant = variantFor(color, kind);
    el.className = 'fx-text ' + (kind || 'float') + ' ' + variant;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.fontSize = fontSizeFor(kind);
    stage.appendChild(el);
    setTimeout(() => el.remove(), kind === 'levelup' ? 2200 : kind === 'critical' ? 1900 : 1780);
  }

  function spawnRing(x, y, variant) {
    const r = document.createElement('div');
    r.className = 'fx-ring ' + (variant || '');
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    stage.appendChild(r);
    setTimeout(() => r.remove(), 1240);
  }

  function particleColor(kind, color, i) {
    const green = color || '#b8d982';
    const gold = '#f4d57d';
    const cream = '#fff2bf';
    if (kind === 'mote') return cream;
    if (kind === 'petal') return i % 2 ? '#f6e3a1' : '#eacb82';
    return i % 2 ? green : '#a9ca74';
  }

  function sprinkle(x, y, color, count, spread) {
    const total = count || 10;
    const radius = spread || 70;
    for (let i = 0; i < total; i++) {
      const kind = i % 5 === 0 ? 'petal' : i % 3 === 0 ? 'mote' : 'leaf';
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.12;
      const dist = 28 + Math.random() * radius;
      const sway = (Math.random() - 0.5) * 34;
      const dx = Math.cos(angle) * dist + sway;
      const dy = Math.sin(angle) * dist - 22 - Math.random() * 34;
      const p = document.createElement('div');
      const c = particleColor(kind, color, i);
      p.className = 'fx-particle ' + kind;
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      if (kind === 'mote') {
        p.style.background = c;
      } else {
        p.style.background = 'linear-gradient(135deg, ' + c + ', rgba(255, 244, 184, 0.86))';
      }
      p.style.setProperty('--dx', dx.toFixed(1) + 'px');
      p.style.setProperty('--dy', dy.toFixed(1) + 'px');
      p.style.setProperty('--rot', (55 + Math.random() * 250).toFixed(1) + 'deg');
      p.style.setProperty('--scale', (0.72 + Math.random() * 0.48).toFixed(2));
      p.style.setProperty('--dur', (1.02 + Math.random() * 0.62).toFixed(2) + 's');
      stage.appendChild(p);
      setTimeout(() => p.remove(), 1750);
    }
  }

  window.fxFloat = function(text, x, y, color) {
    const c = color || '#b8d982';
    spawnFloat(text, x, y, c, 'float');
    sprinkle(x, y, c, 8, 48);
  };

  window.fxCritical = function(text, x, y, color) {
    const c = color || '#e8c84a';
    spawnFloat(text, x, y, c, 'critical');
    spawnRing(x, y, 'harvest');
    sprinkle(x, y, c, 16, 96);
  };

  window.fxLevelUp = function(level, x, y) {
    const cx = x || window.innerWidth / 2;
    const cy = y || window.innerHeight * 0.42;
    spawnFloat('麦浪加冕', cx, cy - 20, '#ffd86b', 'levelup');
    spawnFloat('LV.' + level, cx, cy + 42, '#fff0a6', 'critical');
    spawnRing(cx, cy + 18, 'harvest');
    setTimeout(() => spawnRing(cx, cy + 18, 'harvest'), 180);
    sprinkle(cx, cy + 16, '#f1d174', 28, 132);
  };

  window.fxAchievement = function(title, rarity) {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight * 0.45;
    const colors = {
      bronze:  '#cda06b',
      silver:  '#d8e1d6',
      crystal: '#9ed8c3',
      star:    '#ffd86b',
    };
    const c = colors[rarity] || '#ffd86b';
    spawnFloat('新徽章：' + title, cx, cy, c, 'critical');
    spawnRing(cx, cy + 18, rarity === 'star' ? 'harvest' : '');
    sprinkle(cx, cy + 12, c, 18, 96);
  };

  window.fxClear = function() { stage.innerHTML = ''; };
</script>
</body>
</html>
